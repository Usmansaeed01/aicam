name: Build Android Native APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./artifacts/mobile

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗️ Generate Native Code (Prebuild)
        # 🎯 HACKER FIX: Added --no-install to prevent interactive prompt
        run: npx expo prebuild --platform android --clean --no-install

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 🚀 Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: AICam-Build
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
